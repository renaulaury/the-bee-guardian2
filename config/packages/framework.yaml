# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: "%env(APP_SECRET)%"

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

    php_errors:
        log: true

    http_client:
        scoped_clients:
            jph:
                base_uri: https://randomuser.me/api/ #API qui permet de générer des données d'utilisateurs aléatoires

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
